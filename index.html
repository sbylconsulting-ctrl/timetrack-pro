<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeTrack Pro - Sistema de Fichaje Multiempresa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --bg-primary: #FAFAF8;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #F5F5F3;
            --bg-accent: #1A1A1A;
            --bg-success: #E8F5E9;
            --bg-warning: #FFF8E1;
            --bg-danger: #FFEBEE;
            --bg-info: #E3F2FD;
            
            --text-primary: #1A1A1A;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --text-inverse: #FFFFFF;
            --text-success: #2E7D32;
            --text-warning: #F57C00;
            --text-danger: #C62828;
            --text-info: #1565C0;
            
            --border-light: rgba(0,0,0,0.08);
            --border-medium: rgba(0,0,0,0.12);
            --border-heavy: rgba(0,0,0,0.2);
            
            --accent-primary: #2563EB;
            --accent-success: #16A34A;
            --accent-warning: #EA580C;
            --accent-danger: #DC2626;
            
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
            
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            
            --font-sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'Space Mono', monospace;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body, #root {
            height: 100%;
            width: 100%;
        }
        
        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        input, button, select, textarea {
            font-family: inherit;
            font-size: inherit;
        }
        
        button {
            cursor: pointer;
            border: none;
            background: none;
        }
        
        input:focus, button:focus, select:focus, textarea:focus {
            outline: none;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-12px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        @keyframes ripple {
            0% { transform: scale(0); opacity: 0.6; }
            100% { transform: scale(4); opacity: 0; }
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        
        .animate-slide-in {
            animation: slideIn 0.3s ease-out forwards;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border-medium);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-heavy);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, createContext, useContext, useRef } = React;

        // ============================================
        // CONFIGURACIÓN Y DATOS INICIALES
        // ============================================
        
        const CONFIG = {
            APP_NAME: 'TimeTrack Pro',
            VERSION: '2.0.0',
            LOCAL_STORAGE_KEYS: {
                SESSION: 'timetrack_session',
                COMPANIES: 'timetrack_companies',
                USERS: 'timetrack_users',
                RECORDS: 'timetrack_records',
                LOGS: 'timetrack_logs'
            }
        };

        // Empresas de demo
        const DEFAULT_COMPANIES = [
            {
                id: 'global_root',
                name: 'Global Workspace',
                code: 'GLOBAL',
                status: 'active',
                createdAt: new Date().toISOString(),
                settings: {
                    allowRemote: true,
                    requireObservations: false
                }
            },
            {
                id: 'comp_001',
                name: 'TechCorp Solutions',
                code: 'TECHCORP',
                status: 'active',
                createdAt: new Date().toISOString(),
                settings: {
                    allowRemote: true,
                    requireObservations: false
                }
            },
            {
                id: 'comp_002',
                name: 'Marketing Digital Pro',
                code: 'MKTPRO',
                status: 'active',
                createdAt: new Date().toISOString(),
                settings: {
                    allowRemote: true,
                    requireObservations: false
                }
            }
        ];

        // Usuarios de demo para cada empresa
        const DEFAULT_USERS = [
            {
                id: 'superadmin_001',
                companyId: 'global_root',
                email: 'root@timetrackpro.com',
                password: 'SuperAdmin123!',
                name: 'Administrador',
                lastName: 'Global',
                role: 'superadmin',
                hoursContracted: 160,
                status: 'active',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            },
            // TechCorp
            {
                id: 'admin_tech_001',
                companyId: 'comp_001',
                email: 'admin@techcorp.com',
                password: 'Admin123!',
                name: 'Carlos',
                lastName: 'Rodríguez',
                role: 'admin',
                hoursContracted: 160,
                status: 'active',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            },
            {
                id: 'emp_tech_001',
                companyId: 'comp_001',
                email: 'maria@techcorp.com',
                password: 'Empleado123!',
                name: 'María',
                lastName: 'García López',
                role: 'employee',
                hoursContracted: 160,
                status: 'active',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            },
            {
                id: 'emp_tech_002',
                companyId: 'comp_001',
                email: 'juan@techcorp.com',
                password: 'Empleado123!',
                name: 'Juan',
                lastName: 'Martínez',
                role: 'employee',
                hoursContracted: 160,
                status: 'active',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            },
            // Marketing Digital Pro
            {
                id: 'admin_mkt_001',
                companyId: 'comp_002',
                email: 'admin@mktpro.com',
                password: 'Admin123!',
                name: 'Laura',
                lastName: 'Fernández',
                role: 'admin',
                hoursContracted: 160,
                status: 'active',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            },
            {
                id: 'emp_mkt_001',
                companyId: 'comp_002',
                email: 'pedro@mktpro.com',
                password: 'Empleado123!',
                name: 'Pedro',
                lastName: 'Sánchez',
                role: 'employee',
                hoursContracted: 160,
                status: 'active',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            }
        ];

        // ============================================
        // UTILIDADES
        // ============================================
        
        const Utils = {
            generateId: (prefix = 'id') => `${prefix}_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
            
            formatDate: (date, format = 'short') => {
                const d = new Date(date);
                const options = format === 'long' 
                    ? { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }
                    : { year: 'numeric', month: '2-digit', day: '2-digit' };
                return d.toLocaleDateString('es-ES', options);
            },
            
            formatTime: (date) => {
                return new Date(date).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
            },
            
            formatDateTime: (date) => {
                return `${Utils.formatDate(date)} ${Utils.formatTime(date)}`;
            },
            
            calculateHours: (start, end) => {
                if (!start || !end) return null;
                const diff = new Date(end) - new Date(start);
                const hours = diff / (1000 * 60 * 60);
                return Math.round(hours * 100) / 100;
            },
            
            formatHours: (hours) => {
                if (hours === null || hours === undefined) return '-';
                const h = Math.floor(Math.abs(hours));
                const m = Math.round((Math.abs(hours) - h) * 60);
                const prefix = hours < 0 ? '-' : '';
                return `${prefix}${h}h ${m}m`;
            },

            formatBalance: (worked, contracted) => {
                const balance = (worked || 0) - (contracted || 0);
                return {
                    balance,
                    label: balance === 0 ? 'En objetivo' : balance > 0 ? `+${Utils.formatHours(balance)}` : Utils.formatHours(balance),
                    variant: balance === 0 ? 'info' : balance > 0 ? 'success' : 'warning'
                };
            },
            
            getTodayString: () => {
                return new Date().toISOString().split('T')[0];
            },
            
            isToday: (date) => {
                return new Date(date).toDateString() === new Date().toDateString();
            },
            
            validateEmail: (email) => {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            },
            
            validatePassword: (password) => {
                return password.length >= 6;
            },
            
            debounce: (fn, delay) => {
                let timeoutId;
                return (...args) => {
                    clearTimeout(timeoutId);
                    timeoutId = setTimeout(() => fn(...args), delay);
                };
            }
        };

        // ============================================
        // GESTIÓN DE DATOS MULTIEMPRESA
        // ============================================
        
        const DataService = {
            // Inicializar datos por defecto
            init: () => {
                const companies = DataService.getCompanies();
                if (companies.length === 0) {
                    DataService.saveCompanies(DEFAULT_COMPANIES);
                    DataService.saveUsers(DEFAULT_USERS);
                }
            },
            
            // ===== EMPRESAS =====
            getCompanies: () => {
                const data = localStorage.getItem(CONFIG.LOCAL_STORAGE_KEYS.COMPANIES);
                return data ? JSON.parse(data) : [];
            },
            
            saveCompanies: (companies) => {
                localStorage.setItem(CONFIG.LOCAL_STORAGE_KEYS.COMPANIES, JSON.stringify(companies));
            },
            
            getCompanyById: (id) => {
                return DataService.getCompanies().find(c => c.id === id);
            },
            
            getCompanyByCode: (code) => {
                return DataService.getCompanies().find(c => 
                    c.code.toLowerCase() === code.toLowerCase() && c.status === 'active'
                );
            },
            
            createCompany: (companyData) => {
                const companies = DataService.getCompanies();
                const newCompany = {
                    ...companyData,
                    id: Utils.generateId('comp'),
                    createdAt: new Date().toISOString(),
                    status: 'active',
                    settings: companyData.settings || { allowRemote: true, requireObservations: false }
                };
                companies.push(newCompany);
                DataService.saveCompanies(companies);
                DataService.addLog('CREATE_COMPANY', newCompany.id, `Empresa creada: ${newCompany.name}`);
                return newCompany;
            },
            
            updateCompany: (id, updates) => {
                const companies = DataService.getCompanies();
                const index = companies.findIndex(c => c.id === id);
                if (index !== -1) {
                    companies[index] = { ...companies[index], ...updates, updatedAt: new Date().toISOString() };
                    DataService.saveCompanies(companies);
                    return companies[index];
                }
                return null;
            },

            deleteCompany: (id) => {
                if (id === 'global_root') return false;
                const company = DataService.getCompanyById(id);
                if (!company) return false;
                const companies = DataService.getCompanies().filter(c => c.id !== id);
                const users = DataService.getUsers().filter(u => u.companyId !== id);
                const records = DataService.getRecords().filter(r => r.companyId !== id);
                DataService.saveCompanies(companies);
                DataService.saveUsers(users);
                DataService.saveRecords(records);
                DataService.addLog('DELETE_COMPANY', id, `Empresa eliminada: ${company.name}`, null, null);
                return true;
            },
            
            // ===== USUARIOS (filtrados por empresa) =====
            getUsers: () => {
                const data = localStorage.getItem(CONFIG.LOCAL_STORAGE_KEYS.USERS);
                return data ? JSON.parse(data) : [];
            },
            
            saveUsers: (users) => {
                localStorage.setItem(CONFIG.LOCAL_STORAGE_KEYS.USERS, JSON.stringify(users));
            },
            
            getUsersByCompany: (companyId) => {
                return DataService.getUsers().filter(u => u.companyId === companyId);
            },

            getManageableUsers: (role, companyId) => {
                if (role === 'superadmin') {
                    return DataService.getUsers().filter(u => u.role !== 'superadmin');
                }
                return DataService.getUsersByCompany(companyId);
            },
            
            getUserById: (id) => {
                return DataService.getUsers().find(u => u.id === id);
            },
            
            getUserByEmailAndCompany: (email, companyId) => {
                return DataService.getUsers().find(u => 
                    u.email.toLowerCase() === email.toLowerCase() && 
                    u.companyId === companyId
                );
            },
            
            createUser: (userData, companyId) => {
                const users = DataService.getUsers();
                
                // Verificar que no exista el email en la misma empresa
                const exists = users.find(u => 
                    u.email.toLowerCase() === userData.email.toLowerCase() && 
                    u.companyId === companyId
                );
                if (exists) {
                    return { error: 'Ya existe un usuario con este email en la empresa' };
                }
                
                const newUser = {
                    ...userData,
                    id: Utils.generateId('usr'),
                    companyId,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };
                users.push(newUser);
                DataService.saveUsers(users);
                DataService.addLog('CREATE_USER', newUser.id, `Usuario creado: ${newUser.email}`, null, companyId);
                return newUser;
            },
            
            updateUser: (id, updates, companyId = null) => {
                const users = DataService.getUsers();
                const index = users.findIndex(u => u.id === id && (!companyId || companyId === 'global_root' || u.companyId === companyId));
                if (index !== -1) {
                    users[index] = { 
                        ...users[index], 
                        ...updates, 
                        updatedAt: new Date().toISOString() 
                    };
                    DataService.saveUsers(users);
                    DataService.addLog('UPDATE_USER', id, `Usuario actualizado: ${users[index].email}`, null, companyId);
                    return users[index];
                }
                return null;
            },
            
            deleteUser: (id, companyId = null) => {
                const users = DataService.getUsers();
                const user = users.find(u => u.id === id && (!companyId || companyId === 'global_root' || u.companyId === companyId));
                if (!user) return false;
                
                const filtered = users.filter(u => u.id !== id);
                DataService.saveUsers(filtered);
                DataService.addLog('DELETE_USER', id, `Usuario eliminado: ${user.email}`, null, companyId);
                return true;
            },
            
            // ===== REGISTROS (filtrados por empresa) =====
            getRecords: () => {
                const data = localStorage.getItem(CONFIG.LOCAL_STORAGE_KEYS.RECORDS);
                return data ? JSON.parse(data) : [];
            },
            
            saveRecords: (records) => {
                localStorage.setItem(CONFIG.LOCAL_STORAGE_KEYS.RECORDS, JSON.stringify(records));
            },
            
            getRecordsByCompany: (companyId) => {
                return DataService.getRecords().filter(r => r.companyId === companyId);
            },
            
            getRecordsByUser: (userId, companyId) => {
                return DataService.getRecords().filter(r => r.userId === userId && r.companyId === companyId);
            },
            
            getTodayRecordForUser: (userId, companyId) => {
                const today = Utils.getTodayString();
                return DataService.getRecords().find(r => 
                    r.userId === userId && r.companyId === companyId && r.date === today
                );
            },
            
            createRecord: (recordData, companyId) => {
                const records = DataService.getRecords();
                const newRecord = {
                    ...recordData,
                    id: Utils.generateId('rec'),
                    companyId,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };
                records.push(newRecord);
                DataService.saveRecords(records);
                return newRecord;
            },
            
            updateRecord: (id, updates, companyId, adminId = null) => {
                const records = DataService.getRecords();
                const index = records.findIndex(r => r.id === id && r.companyId === companyId);
                if (index !== -1) {
                    const oldRecord = { ...records[index] };
                    records[index] = { 
                        ...records[index], 
                        ...updates, 
                        updatedAt: new Date().toISOString(),
                        lastModifiedBy: adminId,
                        modificationHistory: [
                            ...(records[index].modificationHistory || []),
                            {
                                date: new Date().toISOString(),
                                modifiedBy: adminId,
                                changes: updates,
                                previousValues: oldRecord
                            }
                        ]
                    };
                    DataService.saveRecords(records);
                    if (adminId) {
                        DataService.addLog('MODIFY_RECORD', id, `Registro modificado por admin`, adminId, companyId);
                    }
                    return records[index];
                }
                return null;
            },
            
            // ===== LOGS (filtrados por empresa) =====
            getLogs: () => {
                const data = localStorage.getItem(CONFIG.LOCAL_STORAGE_KEYS.LOGS);
                return data ? JSON.parse(data) : [];
            },
            
            getLogsByCompany: (companyId) => {
                return DataService.getLogs().filter(l => l.companyId === companyId);
            },
            
            addLog: (action, targetId, description, performedBy = null, companyId = null) => {
                const logs = DataService.getLogs();
                logs.push({
                    id: Utils.generateId('log'),
                    action,
                    targetId,
                    description,
                    performedBy,
                    companyId,
                    timestamp: new Date().toISOString(),
                    userAgent: navigator.userAgent
                });
                localStorage.setItem(CONFIG.LOCAL_STORAGE_KEYS.LOGS, JSON.stringify(logs));
            },
            
            // ===== SESIÓN =====
            getSession: () => {
                const data = localStorage.getItem(CONFIG.LOCAL_STORAGE_KEYS.SESSION);
                return data ? JSON.parse(data) : null;
            },
            
            setSession: (user, company) => {
                localStorage.setItem(CONFIG.LOCAL_STORAGE_KEYS.SESSION, JSON.stringify({
                    userId: user.id,
                    companyId: company.id,
                    role: user.role,
                    loginAt: new Date().toISOString()
                }));
            },
            
            clearSession: () => {
                localStorage.removeItem(CONFIG.LOCAL_STORAGE_KEYS.SESSION);
            }
        };

        // Inicializar datos
        DataService.init();

        // ============================================
        // CONTEXTO DE AUTENTICACIÓN
        // ============================================
        
        const AuthContext = createContext(null);

        const AuthProvider = ({ children }) => {
            const [user, setUser] = useState(null);
            const [company, setCompany] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const session = DataService.getSession();
                if (session) {
                    const userData = DataService.getUserById(session.userId);
                    const companyData = DataService.getCompanyById(session.companyId);
                    if (userData && userData.status === 'active' && companyData && companyData.status === 'active') {
                        setUser(userData);
                        setCompany(companyData);
                    } else {
                        DataService.clearSession();
                    }
                }
                setLoading(false);
            }, []);

            const login = useCallback((companyCode, email, password) => {
                // Buscar empresa por código
                const companyData = DataService.getCompanyByCode(companyCode);
                if (!companyData) {
                    return { success: false, error: 'Código de empresa no válido' };
                }
                
                // Buscar usuario en esa empresa
                const userData = DataService.getUserByEmailAndCompany(email, companyData.id);
                if (!userData) {
                    return { success: false, error: 'Usuario no encontrado en esta empresa' };
                }
                if (userData.status !== 'active') {
                    return { success: false, error: 'Usuario desactivado. Contacte con el administrador.' };
                }
                if (userData.password !== password) {
                    return { success: false, error: 'Contraseña incorrecta' };
                }
                
                DataService.setSession(userData, companyData);
                DataService.addLog('LOGIN', userData.id, `Inicio de sesión: ${userData.email}`, userData.id, companyData.id);
                setUser(userData);
                setCompany(companyData);
                return { success: true };
            }, []);

            const logout = useCallback(() => {
                if (user && company) {
                    DataService.addLog('LOGOUT', user.id, `Cierre de sesión: ${user.email}`, user.id, company.id);
                }
                DataService.clearSession();
                setUser(null);
                setCompany(null);
            }, [user, company]);

            const refreshUser = useCallback(() => {
                if (user) {
                    const updated = DataService.getUserById(user.id);
                    setUser(updated);
                }
            }, [user]);

            return (
                <AuthContext.Provider value={{ user, company, loading, login, logout, refreshUser }}>
                    {children}
                </AuthContext.Provider>
            );
        };

        const useAuth = () => useContext(AuthContext);

        // ============================================
        // CONTEXTO DE TOAST
        // ============================================
        
        const ToastContext = createContext(null);

        const ToastProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);

            const addToast = useCallback((message, type = 'info', duration = 4000) => {
                const id = Utils.generateId('toast');
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, duration);
            }, []);

            return (
                <ToastContext.Provider value={{ addToast }}>
                    {children}
                    <div style={{
                        position: 'fixed',
                        bottom: '20px',
                        right: '20px',
                        zIndex: 2000,
                        display: 'flex',
                        flexDirection: 'column',
                        gap: '10px'
                    }}>
                        {toasts.map(toast => (
                            <div
                                key={toast.id}
                                className="animate-slide-in"
                                style={{
                                    padding: '14px 20px',
                                    borderRadius: 'var(--radius-md)',
                                    background: toast.type === 'error' ? 'var(--accent-danger)' 
                                        : toast.type === 'success' ? 'var(--accent-success)'
                                        : toast.type === 'warning' ? 'var(--accent-warning)'
                                        : 'var(--bg-accent)',
                                    color: 'white',
                                    fontSize: '14px',
                                    fontWeight: '500',
                                    boxShadow: 'var(--shadow-lg)',
                                    maxWidth: '320px'
                                }}
                            >
                                {toast.message}
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        };

        const useToast = () => useContext(ToastContext);

        // ============================================
        // COMPONENTES DE UI BASE
        // ============================================
        
        const Button = ({ 
            children, 
            variant = 'primary', 
            size = 'md', 
            fullWidth = false,
            loading = false,
            disabled = false,
            icon = null,
            onClick,
            style = {},
            ...props 
        }) => {
            const baseStyles = {
                display: 'inline-flex',
                alignItems: 'center',
                justifyContent: 'center',
                gap: '8px',
                fontWeight: '500',
                borderRadius: 'var(--radius-md)',
                transition: 'all 0.2s ease',

                if (!disabled && !loading && onClick) {
                    const button = e.currentTarget;
                    const ripple = document.createElement('span');
                    const rect = button.getBoundingClientRect();
                    const size = Math.max(rect.width, rect.height);
                    ripple.style.cssText = `
                        position: absolute;
                        width: ${size}px;
                        height: ${size}px;
                        background: rgba(255,255,255,0.3);
                        border-radius: 50%;
                        left: ${e.clientX - rect.left - size/2}px;
                        top: ${e.clientY - rect.top - size/2}px;
                        animation: ripple 0.6s ease-out forwards;
                        pointer-events: none;
                    `;
                    button.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 600);
                    onClick(e);
                }

        const AdminView = () => {
            const { user, company, logout } = useAuth();
            const { addToast } = useToast();
            const [activeTab, setActiveTab] = useState('dashboard');
            const [users, setUsers] = useState([]);
            const [records, setRecords] = useState([]);
            const [logs, setLogs] = useState([]);
            const [showUserModal, setShowUserModal] = useState(false);
            const [editingUser, setEditingUser] = useState(null);
            const [showRecordModal, setShowRecordModal] = useState(false);
            const [editingRecord, setEditingRecord] = useState(null);
            
            // Filtros
            const [filterUser, setFilterUser] = useState('');
            const [filterDateFrom, setFilterDateFrom] = useState('');
            const [filterDateTo, setFilterDateTo] = useState('');

            useEffect(() => {
                loadData();
            }, [company, user]);

            const loadData = () => {
                // Solo cargar datos de la empresa actual
                setUsers(DataService.getManageableUsers(user.role, company.id));
                setRecords(DataService.getRecordsByCompany(company.id).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)));
                setLogs(DataService.getLogsByCompany(company.id).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)));
            };

            // Estadísticas
            const stats = useMemo(() => {
                const today = Utils.getTodayString();
                const activeUsers = users.filter(u => u.status === 'active' && u.role === 'employee').length;
                const todayRecords = records.filter(r => r.date === today);
                const openSessions = todayRecords.filter(r => r.checkIn && !r.checkOut).length;
                const totalHoursToday = todayRecords.reduce((acc, r) => acc + (r.hoursWorked || 0), 0);
                
                return { activeUsers, todayRecords: todayRecords.length, openSessions, totalHoursToday };
            }, [users, records]);

            // Filtrar registros
            const filteredRecords = useMemo(() => {
                return records.filter(r => {
                    if (filterUser && r.userId !== filterUser) return false;
                    if (filterDateFrom && r.date < filterDateFrom) return false;
                    if (filterDateTo && r.date > filterDateTo) return false;
                    return true;
                });
            }, [records, filterUser, filterDateFrom, filterDateTo]);

            // Exportar CSV
            const exportCSV = () => {
                const headers = ['Fecha', 'Empleado', 'Email', 'Entrada', 'Salida', 'Horas', 'Tipo', 'Observaciones'];
                const rows = filteredRecords.map(r => [
                    r.date,
                    r.userName,
                    r.userEmail,
                    r.checkIn ? Utils.formatTime(r.checkIn) : '',
                    r.checkOut ? Utils.formatTime(r.checkOut) : '',
                    r.hoursWorked || '',
                    r.checkType,
                    r.observations || ''
                ]);
                
                const csv = [headers, ...rows].map(row => row.join(',')).join('\n');
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `fichajes_${company.code}_${Utils.getTodayString()}.csv`;
                a.click();
                URL.revokeObjectURL(url);
                addToast('Archivo CSV descargado', 'success');
            };

            // CRUD Usuarios
            const UserForm = ({ user: editUser, onClose }) => {
                const [formData, setFormData] = useState({
                    name: editUser?.name || '',
                    lastName: editUser?.lastName || '',
                    email: editUser?.email || '',
                    password: '',
                    role: editUser?.role || 'employee',
                    companyId: editUser?.companyId || company.id,
                    hoursContracted: editUser?.hoursContracted || 160,
                    status: editUser?.status || 'active'
                });
                const [formErrors, setFormErrors] = useState({});
                const [saving, setSaving] = useState(false);

                const handleSave = async () => {
                    const errors = {};
                    if (!formData.name) errors.name = 'Requerido';
                    if (!formData.lastName) errors.lastName = 'Requerido';
                    if (!formData.email) errors.email = 'Requerido';
                    else if (!Utils.validateEmail(formData.email)) errors.email = 'Email no válido';
                    if (!editUser && !formData.password) errors.password = 'Requerido';
                    else if (formData.password && formData.password.length < 6) errors.password = 'Mínimo 6 caracteres';

                    if (Object.keys(errors).length > 0) {
                        setFormErrors(errors);
                        return;
                    }

                    setSaving(true);
                    await new Promise(r => setTimeout(r, 500));

                    if (editUser) {
                        const updates = { ...formData };
                        if (!updates.password) delete updates.password;
                        DataService.updateUser(editUser.id, updates, user.role === 'superadmin' ? null : company.id);
                        addToast('Usuario actualizado', 'success');
                    } else {
                        const result = DataService.createUser(formData, user.role === 'superadmin' ? formData.companyId : company.id);
                        if (result.error) {
                            addToast(result.error, 'error');
                            setSaving(false);
                            return;
                        }
                        addToast('Usuario creado', 'success');
                    }

                    setSaving(false);
                    loadData();
                    onClose();
                };

                return (
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
                            <Input
                                label="Nombre"
                                value={formData.name}
                                onChange={(e) => setFormData(prev => ({ ...prev, name: e.target.value }))}
                                error={formErrors.name}
                            />
                            <Input
                                label="Apellidos"
                                value={formData.lastName}
                                onChange={(e) => setFormData(prev => ({ ...prev, lastName: e.target.value }))}
                                error={formErrors.lastName}
                            />
                        </div>
                        <Input
                            label="Email"
                            type="email"
                            value={formData.email}

                            </Button>

                    </div>
                );
            };

            // Editar registro
            const RecordForm = ({ record, onClose }) => {
                const [formData, setFormData] = useState({
                    checkIn: record.checkIn ? record.checkIn.slice(0, 16) : '',
                    checkOut: record.checkOut ? record.checkOut.slice(0, 16) : '',
                    checkType: record.checkType || 'presencial',
                    observations: record.observations || ''
                });
                const [saving, setSaving] = useState(false);

                const handleSave = async () => {
                    setSaving(true);
                    await new Promise(r => setTimeout(r, 500));

                    const checkInDate = formData.checkIn ? new Date(formData.checkIn).toISOString() : null;
                    const checkOutDate = formData.checkOut ? new Date(formData.checkOut).toISOString() : null;
                    const hoursWorked = checkInDate && checkOutDate ? Utils.calculateHours(checkInDate, checkOutDate) : null;

                    DataService.updateRecord(record.id, {
                        checkIn: checkInDate,
                        checkOut: checkOutDate,
                        hoursWorked,
                        checkType: formData.checkType,
                        observations: formData.observations,
                        status: checkOutDate ? 'complete' : 'incomplete'
                    }, company.id, user.id);

                    addToast('Registro actualizado', 'success');
                    setSaving(false);
                    loadData();
                    onClose();
                };

                return (
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>

                            label="Hora de salida"
                            type="datetime-local"
                            value={formData.checkOut}
                            onChange={(e) => setFormData(prev => ({ ...prev, checkOut: e.target.value }))}
                        />

                            label="Tipo"
                            value={formData.checkType}
                            onChange={(e) => setFormData(prev => ({ ...prev, checkType: e.target.value }))}

                                { value: 'remoto', label: 'Remoto' }
                            ]}
                        />

                            label="Observaciones"
                            value={formData.observations}
                            onChange={(e) => setFormData(prev => ({ ...prev, observations: e.target.value }))}
                        />

                                Guardar cambios
                            </Button>
                        </div>

                        return;

                    setSaving(true);
                    await new Promise(r => setTimeout(r, 400));
                    DataService.createCompany({
                        name: formData.name,
                        code: formData.code.toUpperCase()

                    setSaving(false);

                                                                        size="sm"
                                                                        onClick={() => {
                                                                            if (confirm('¿Eliminar este usuario?')) {
                                                                                DataService.deleteUser(u.id, company.id);
                                                                                addToast('Usuario eliminado', 'success');
                                                                                loadData();
                                                                            }
                                                                        }}
                                                                        icon={<Icons.Trash />}
                                                                        style={{ color: 'var(--accent-danger)' }}
                                                                    />
                                                                )}
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </Card>
                            </div>
                        )}

                        {/* Logs */}
                        {activeTab === 'logs' && (
                            <div className="animate-fade-in">
                                <Card padding={false}>
                                    <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border-light)' }}>
                                        <h3 style={{ fontSize: '16px', fontWeight: '600' }}>Registro de actividad</h3>
                                    </div>
                                    <div style={{ maxHeight: '600px', overflow: 'auto' }}>
                                        {logs.slice(0, 100).map(log => (
                                            <div key={log.id} style={{
                                                padding: '12px 20px',
                                                borderBottom: '1px solid var(--border-light)',
                                                display: 'flex',
                                                justifyContent: 'space-between',
                                                alignItems: 'flex-start',
                                                gap: '16px'
                                            }}>
                                                <div>
                                                    <Badge style={{ marginRight: '8px' }}>{log.action}</Badge>
                                                    <span style={{ fontSize: '14px' }}>{log.description}</span>
                                                </div>
                                                <span style={{ 
                                                    fontSize: '12px', 
                                                    color: 'var(--text-tertiary)',
                                                    whiteSpace: 'nowrap'
                                                }}>
                                                    {Utils.formatDateTime(log.timestamp)}
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                </Card>
                            </div>
                        )}
                    </main>

                    {/* Modal Usuario */}
                    <Modal
                        isOpen={showUserModal}
                        onClose={() => { setShowUserModal(false); setEditingUser(null); }}
                        title={editingUser ? 'Editar usuario' : 'Nuevo usuario'}
                        size="md"
                    >
                        <UserForm 
                            user={editingUser} 
                            onClose={() => { setShowUserModal(false); setEditingUser(null); }} 
                        />
                    </Modal>

                    {/* Modal Registro */}
                    <Modal
                        isOpen={showRecordModal}
                        onClose={() => { setShowRecordModal(false); setEditingRecord(null); }}
                        title="Editar registro"
                        size="md"
                    >
                        {editingRecord && (
                            <RecordForm 
                                record={editingRecord} 
                                onClose={() => { setShowRecordModal(false); setEditingRecord(null); }} 
                            />
                        )}
                    </Modal>
                </div>
            );
        };

        // ============================================
        // APP PRINCIPAL
        // ============================================
        
        const App = () => {
            const { user, loading } = useAuth();

            if (loading) {
                return (
                    <div style={{
                        minHeight: '100vh',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        background: 'var(--bg-primary)'
                    }}>
                        <div style={{
                            width: '48px',
                            height: '48px',
                            border: '3px solid var(--border-light)',
                            borderTopColor: 'var(--accent-primary)',
                            borderRadius: '50%',
                            animation: 'spin 0.8s linear infinite'
                        }} />
                    </div>
                );
            }

            if (!user) {
                return <LoginScreen />;
            }

            return (user.role === 'admin' || user.role === 'superadmin') ? <AdminView /> : <EmployeeView />;
        };

        // Render
        ReactDOM.createRoot(document.getElementById('root')).render(
            <ToastProvider>
                <AuthProvider>
                    <App />
                </AuthProvider>
            </ToastProvider>
        );
    </script>
</body>
</html>
